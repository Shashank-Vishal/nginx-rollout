apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: nginx-rollout
spec:
  replicas: 5

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
      - name: nginx
        image: nginx:does-not-exist

        ports:
        - containerPort: 80

  strategy:
    canary:
      canaryService: nginx-canary
      stableService: nginx-stable

      trafficRouting:
        nginx:
          stableIngress: nginx-ingress

      steps:
      - setWeight: 20

      - pause:
          duration: 60s

      - setWeight: 50

      - pause:
          duration: 60s

      - setWeight: 100